<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:site_name" content="相册存档">
    <meta property="og:description" content="点击查看更多相册的存档！">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://2024-10-24.zip/images/img.jpg">
    <meta property="og:image:secure_url" content="https://2024-10-24.zip/images/img.jpg">
    <link rel="apple-touch-icon" href="https://2024-10-24.zip/images/img.jpgg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="shortcut icon" href="https://2024-10-24.zip/images/img.jpg">
    <link rel="icon" href="https://2024-10-24.zip/images/img.jpg">
    <link rel="apple-touch-icon-precomposed" href="https://2024-10-24.zip/images/img.jpg">
    <meta name="msapplication-TileImage" content="https://2024-10-24.zip/images/img.jpg">
    <meta name="description" content="十月黑雨 — 十月相册存档" />
    <title>相册存档</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>2024-10-24.zip</h1>
        <div class="divider"></div>
        <p>相册存档</p>
    </header>
    <div class="gallery" id="galleryContainer">
        </div>
    <div id="lightbox"><img src="" alt="查看原图"></div>
    <script>
        const container = document.getElementById('galleryContainer');
        const lightbox = document.getElementById('lightbox');
        const lbImg = lightbox.querySelector('img');
        const observerOptions = {
            root: null,
            rootMargin: '200px 0px', 
            threshold: 0.01
        };
        const imgObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    const card = img.parentElement;
                    img.src = img.dataset.src;
                    img.onload = () => {
                        img.classList.add('loaded');
                        card.classList.remove('loading'); 
                    };
                    observer.unobserve(img); 
                }
            });
        }, observerOptions);
        async function loadGallery() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                container.innerHTML = '';
                const fragment = document.createDocumentFragment();
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = `gallery-item ${item.type || 'normal'} loading`;
                    card.innerHTML = `
                        <img data-src="${item.url}" alt="${item.title}">
                        <div class="overlay"><span>${item.title}</span></div>
                    `;
                    card.addEventListener('click', () => {
                        lbImg.src = item.url;
                        lightbox.style.display = 'flex';
                        document.body.style.overflow = 'hidden';
                    });
                    fragment.appendChild(card);
                });
                container.appendChild(fragment);
                const images = container.querySelectorAll('img');
                images.forEach(img => imgObserver.observe(img));
            } catch (error) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #ff7675;">
                    加载错误: ${error.message} <br> 请确保使用 HTTP 服务器（如 Live Server）运行。
                </div>`;
            }
        }
        lightbox.addEventListener('click', () => {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
            lbImg.src = ''; 
        });

        loadGallery();
 //横图：wide，竖图：tall   
    </script>
</body>

</html>
