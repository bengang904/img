<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相册存档</title>
    <style>
        :root {
            --primary-color: #2d3436;
            --accent-color: #0984e3;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --skeleton-bg: #e1e4e8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--primary-color);
            overflow-x: hidden;
        }
        header {
            text-align: center;
            padding: 80px 20px;
            animation: fadeInDown 1s ease;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 300;
        }

        header .divider {
            width: 50px;
            height: 3px;
            background: var(--accent-color);
            margin: 20px auto;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 250px;
            grid-gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-color: var(--skeleton-bg); 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .gallery-item.loading::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: skeleton-scan 1.5s infinite;
        }

        @keyframes skeleton-scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .gallery-item.tall { grid-row: span 2; }
        .gallery-item.wide { grid-column: span 2; }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; 
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .gallery-item img.loaded {
            opacity: 1;
        }
        .gallery-item .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            backdrop-filter: blur(3px);
            transition: opacity 0.4s ease;
            z-index: 2;
        }

        .gallery-item .overlay span {
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .gallery-item:hover img.loaded { transform: scale(1.08); }
        .gallery-item:hover .overlay { opacity: 1; }
        .gallery-item:hover .overlay span { transform: translateY(0); }
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr 1fr; grid-auto-rows: 200px; }
            .gallery-item.wide { grid-column: span 1; }
            header h1 { font-size: 1.8rem; padding: 40px 10px 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>2024-10-24.zip</h1>
        <div class="divider"></div>
        <p>相册存档</p>
    </header>

    <div class="gallery" id="galleryContainer">
        </div>

    <div id="lightbox"><img src="" alt="查看原图"></div>

    <script>
        const container = document.getElementById('galleryContainer');
        const lightbox = document.getElementById('lightbox');
        const lbImg = lightbox.querySelector('img');
        const observerOptions = {
            root: null,
            rootMargin: '200px 0px', 
            threshold: 0.01
        };

        const imgObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    const card = img.parentElement;
                    img.src = img.dataset.src;
                    
                    img.onload = () => {
                        img.classList.add('loaded');
                        card.classList.remove('loading'); 
                    };
                    
                    observer.unobserve(img); 
                }
            });
        }, observerOptions);

        // 2. 异步获取数据
        async function loadGallery() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                
                container.innerHTML = '';
                
                // 使用 Fragment 优化性能，减少重绘
                const fragment = document.createDocumentFragment();

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = `gallery-item ${item.type || 'normal'} loading`;
                    
                    // 使用 data-src 存储真实地址实现懒加载
                    card.innerHTML = `
                        <img data-src="${item.url}" alt="${item.title}">
                        <div class="overlay"><span>${item.title}</span></div>
                    `;

                    card.addEventListener('click', () => {
                        lbImg.src = item.url;
                        lightbox.style.display = 'flex';
                        document.body.style.overflow = 'hidden';
                    });

                    fragment.appendChild(card);
                });

                container.appendChild(fragment);

                // 3. 启动观察
                const images = container.querySelectorAll('img');
                images.forEach(img => imgObserver.observe(img));

            } catch (error) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #ff7675;">
                    加载错误: ${error.message} <br> 请确保使用 HTTP 服务器（如 Live Server）运行。
                </div>`;
            }
        }

        lightbox.addEventListener('click', () => {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
            lbImg.src = ''; 
        });

        loadGallery();
 //横图：wide，竖图：tall   
    </script>
</body>
</html>
